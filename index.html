<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOJI STOMP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111827;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
    }
    canvas {
      display: block;
      border: 3px solid #2d3a50;
      border-radius: 6px;
      image-rendering: pixelated;
      image-rendering: crisp-edges; /* Firefox */
      width: 1280px;
      max-width: 100%;
      aspect-ratio: 800 / 300;
    }
    #rotate-msg {
      display: none;
      position: fixed;
      inset: 0;
      background: #111827;
      color: #fff;
      font-size: 18px;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 100;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
    }
    @media (max-width: 600px) and (orientation: portrait) {
      #rotate-msg { display: flex; }
    }
    #instructions {
      color: rgba(255, 255, 255, 0.3);
      font-size: 11px;
      margin-top: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
  </style>
</head>

    tolerance = tolerance !== undefined ? tolerance : 28;
    const oc   = document.createElement('canvas');
    oc.width   = img.naturalWidth;
    oc.height  = img.naturalHeight;
    const oc2d = oc.getContext('2d');
    oc2d.drawImage(img, 0, 0);

    const id = oc2d.getImageData(0, 0, oc.width, oc.height);
    const d  = id.data;
    const w  = oc.width, h = oc.height;

    // Sample background color from top-left corner pixel
    const bgR = d[0], bgG = d[1], bgB = d[2];

    function matches(i4) {
      return Math.abs(d[i4]   - bgR) <= tolerance &&
             Math.abs(d[i4+1] - bgG) <= tolerance &&
             Math.abs(d[i4+2] - bgB) <= tolerance;
    }

    const visited = new Uint8Array(w * h);
    const stack   = [];

    // Seed flood-fill from all four edges
    for (let x = 0; x < w; x++) { stack.push(x); stack.push((h - 1) * w + x); }
    for (let y = 1; y < h - 1; y++) { stack.push(y * w); stack.push(y * w + w - 1); }

    while (stack.length) {
      const idx = stack.pop();
      if (visited[idx]) continue;
      visited[idx] = 1;
      const i4 = idx * 4;
      if (!matches(i4)) continue;
      d[i4 + 3] = 0; // make transparent
      const px = idx % w, py = (idx / w) | 0;
      if (px > 0)   stack.push(idx - 1);
      if (px < w-1) stack.push(idx + 1);
      if (py > 0)   stack.push(idx - w);
      if (py < h-1) stack.push(idx + w);
    }

    oc2d.putImageData(id, 0, 0);
    return oc; // offscreen canvas is directly drawable via ctx.drawImage
  }

  function loadSprites() {
    for (const [key, src] of Object.entries(SPRITE_DATA)) {
      const img = new Image();
      img.onload = (function(k, im) {
        return function() { SPRITES[k] = removeBackground(im); };
      })(key, img);
      img.src = src;
    }
  }

  function loadTrees() {
    ['tree1', 'tree2', 'tree3'].forEach((key, i) => {
      if (!TREE_DATA[key]) return;
      const img = new Image();
      img.onload = () => { TREE_IMGS[i] = img; };
      img.src = TREE_DATA[key];
    });
  }

  // Draw a rounded rectangle path (does not fill/stroke � caller does that)
  function rrect(ctx, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // Lighten (+) or darken (-) a hex color
  function shade(hex, amt) {
    const n = parseInt(hex.replace('#', ''), 16);
    const r = Math.min(255, Math.max(0, (n >> 16) + amt));
    const g = Math.min(255, Math.max(0, ((n >> 8) & 0xff) + amt));
    const b = Math.min(255, Math.max(0, (n & 0xff) + amt));
    return `rgb(${r},${g},${b})`;
  }

  // ================================================================
  // GOJI SPRITE DRAWING
  // ================================================================
  function drawGojiCanvas(ctx, x, y, stage, state, frame) {
    const sd  = STAGE_DATA[stage];
    const w   = sd.w;
    const h   = sd.h;
    const col = sd.color;

    // Proportional measurements
    const legW   = Math.round(w * 0.22);
    const legH   = Math.round(h * 0.22);
    const bodyH  = Math.round(h * 0.50);
    const bodyW  = Math.round(w * 0.82);
    const bodyX  = x + Math.round((w - bodyW) / 2);
    const bodyY  = y + h - bodyH - legH;
    const headR  = Math.round(w * 0.43);
    const hcx    = x + Math.round(w / 2);        // head center x
    const hcy    = bodyY - headR + Math.round(headR * 0.32); // head center y

    // ---- TAIL ----
    ctx.save();
    ctx.strokeStyle = shade(col, -25);
    ctx.lineWidth   = stage === 3 ? 6 : stage === 2 ? 4 : 3;
    ctx.lineCap     = 'round';
    ctx.beginPath();
    const tx = bodyX + bodyW * 0.18;
    const ty = bodyY + bodyH * 0.5;
    ctx.moveTo(tx, ty);
    ctx.quadraticCurveTo(tx - w * 0.42, ty - h * 0.08, tx - w * 0.32, ty - h * 0.30);
    ctx.stroke();
    ctx.restore();

    // ---- BACK SPINES (Stage 3 only) ----
    if (stage === 3) {
      ctx.fillStyle = shade(col, -35);
      for (let i = 0; i < 3; i++) {
        const sx = bodyX + bodyW * 0.2 + i * bodyW * 0.22;
        const sz = 7 - i;
        ctx.beginPath();
        ctx.moveTo(sx, bodyY - sz * 2.4);
        ctx.lineTo(sx - sz, bodyY + 1);
        ctx.lineTo(sx + sz, bodyY + 1);
        ctx.closePath();
        ctx.fill();
      }
    }

    // ---- LEGS ----
    ctx.fillStyle = shade(col, -18);
    const legY  = y + h - legH;
    const leg1x = x + Math.round(w * 0.18);
    const leg2x = x + Math.round(w * 0.56);

    if (state === 'run1') {
      ctx.fillRect(leg1x,     legY + 3, legW, legH - 3);
      ctx.fillRect(leg2x,     legY - 5, legW, legH - 2);
    } else if (state === 'run2') {
      ctx.fillRect(leg1x,     legY - 5, legW, legH - 2);
      ctx.fillRect(leg2x,     legY + 3, legW, legH - 3);
    } else if (state === 'jump') {
      ctx.fillRect(leg1x + 2, legY - 7, legW, legH - 4);
      ctx.fillRect(leg2x - 2, legY - 7, legW, legH - 4);
    } else if (state === 'dead') {
      ctx.fillRect(leg1x - 4, legY,     legW, legH);
      ctx.fillRect(leg2x + 4, legY,     legW, legH);
    } else { // idle
      ctx.fillRect(leg1x,     legY,     legW, legH);
      ctx.fillRect(leg2x,     legY,     legW, legH);
    }

    // ---- BODY ----
    ctx.fillStyle = col;
    rrect(ctx, bodyX, bodyY, bodyW, bodyH, Math.round(bodyW * 0.28));
    ctx.fill();

    // Belly highlight (stage 2+)
    if (stage >= 2) {
      ctx.fillStyle = 'rgba(255,255,255,0.11)';
      rrect(ctx, bodyX + bodyW*0.22, bodyY + bodyH*0.38, bodyW*0.56, bodyH*0.38, bodyH*0.18);
      ctx.fill();
    }

    // ---- HEAD ----
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(hcx, hcy, headR, 0, Math.PI * 2);
    ctx.fill();

    // Head highlight
    ctx.fillStyle = 'rgba(255,255,255,0.14)';
    ctx.beginPath();
    ctx.arc(hcx - headR * 0.22, hcy - headR * 0.22, headR * 0.38, 0, Math.PI * 2);
    ctx.fill();

    // ---- EYES ----
    const eox  = headR * 0.37;
    const eoy  = headR * 0.08;
    const er   = Math.max(3, Math.round(headR * 0.27));
    const pr   = Math.max(1, Math.round(er * 0.55));
    const elx  = hcx - eox;
    const erx  = hcx + eox;
    const ey   = hcy + eoy;

    if (state === 'dead') {
      // X eyes
      ctx.strokeStyle = '#222';
      ctx.lineWidth   = 2;
      const xs = er * 0.75;
      ctx.beginPath();
      ctx.moveTo(elx - xs, ey - xs); ctx.lineTo(elx + xs, ey + xs);
      ctx.moveTo(elx + xs, ey - xs); ctx.lineTo(elx - xs, ey + xs);
      ctx.moveTo(erx - xs, ey - xs); ctx.lineTo(erx + xs, ey + xs);
      ctx.moveTo(erx + xs, ey - xs); ctx.lineTo(erx - xs, ey + xs);
      ctx.stroke();

      // Tongue
      ctx.fillStyle = '#FF6B8A';
      ctx.beginPath();
      ctx.ellipse(hcx, hcy + headR * 0.67, headR * 0.22, headR * 0.14, 0, 0, Math.PI * 2);
      ctx.fill();

    } else {
      const blink = (frame % 90) < 5;

      // Eye whites
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.arc(elx, ey, er, 0, Math.PI * 2);
      ctx.arc(erx, ey, er, 0, Math.PI * 2);
      ctx.fill();

      if (!blink) {
        const pdx = (state === 'jump') ? 1 : 2;
        // Pupils
        ctx.fillStyle = '#1a1a1a';
        ctx.beginPath();
        ctx.arc(elx + pdx, ey + 1, pr, 0, Math.PI * 2);
        ctx.arc(erx + pdx, ey + 1, pr, 0, Math.PI * 2);
        ctx.fill();
        // Shine
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        const sr = Math.max(1, Math.round(pr * 0.42));
        ctx.beginPath();
        ctx.arc(elx + pdx - 1, ey - 1, sr, 0, Math.PI * 2);
        ctx.arc(erx + pdx - 1, ey - 1, sr, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth   = 1.5;
        ctx.beginPath();
        ctx.moveTo(elx - er, ey); ctx.lineTo(elx + er, ey);
        ctx.moveTo(erx - er, ey); ctx.lineTo(erx + er, ey);
        ctx.stroke();
      }

      // Eyebrows
      if (stage === 1) {
        // Cute raised arcs
        ctx.strokeStyle = shade(col, -30);
        ctx.lineWidth   = 1.5;
        ctx.beginPath();
        ctx.arc(elx, ey - er * 1.35, er * 0.9, Math.PI * 1.18, Math.PI * 1.82);
        ctx.arc(erx, ey - er * 1.35, er * 0.9, Math.PI * 1.18, Math.PI * 1.82);
        ctx.stroke();
      } else if (stage === 2) {
        // Slight inward slant = grumpy
        ctx.strokeStyle = shade(col, -40);
        ctx.lineWidth   = 2;
        ctx.beginPath();
        ctx.moveTo(elx - er,       ey - er * 1.55);
        ctx.lineTo(elx + er * 0.3, ey - er * 1.1);
        ctx.moveTo(erx + er,       ey - er * 1.55);
        ctx.lineTo(erx - er * 0.3, ey - er * 1.1);
        ctx.stroke();
      } else {
        // Stage 3 � thick heavy brows
        ctx.fillStyle = shade(col, -48);
        ctx.save();
        ctx.translate(elx, ey - er * 1.45);
        ctx.rotate(-0.28);
        ctx.fillRect(-er, -2.5, er * 1.7, 5);
        ctx.restore();
        ctx.save();
        ctx.translate(erx, ey - er * 1.45);
        ctx.rotate(0.28);
        ctx.fillRect(-er * 0.7, -2.5, er * 1.7, 5);
        ctx.restore();
      }

      // Mouth
      ctx.strokeStyle = shade(col, -30);
      ctx.lineWidth   = 1.5;
      ctx.beginPath();
      if (stage === 1) {
        // Small smile
        ctx.arc(hcx, hcy + headR * 0.48, headR * 0.26, 0.2, Math.PI - 0.2);
      } else if (stage === 2) {
        // Neutral line
        ctx.moveTo(hcx - headR * 0.26, hcy + headR * 0.58);
        ctx.lineTo(hcx + headR * 0.26, hcy + headR * 0.58);
      } else {
        // Slight frown with teeth
        ctx.arc(hcx, hcy + headR * 0.78, headR * 0.26, Math.PI + 0.32, -0.32);
        ctx.stroke();
        // Teeth
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(hcx - headR * 0.18, hcy + headR * 0.53, headR * 0.14, headR * 0.22);
        ctx.fillRect(hcx + headR * 0.04, hcy + headR * 0.53, headR * 0.14, headR * 0.22);
        ctx.beginPath(); // reset path � teeth drawn, skip extra stroke
      }
      ctx.stroke();
    }
  }

  // Sprite-based drawGoji — dispatches to PNG sprites, falls back to canvas shapes
  function drawGoji(ctx, x, y, stage, state, frame) {
    const sd  = STAGE_DATA[stage];
    const key = (state === 'run1' || state === 'run2') ? state
              : state === 'dead' ? 'dead'
              : 'idle'; // idle covers: idle, jump, any unlisted state
    const img = SPRITES[key];
    // SPRITES[key] is an offscreen Canvas after removeBackground() � use .width check
    if (img && img.width > 0) {
      ctx.drawImage(img, x, y + (sd.drawOffsetY || 0), sd.w, sd.h);
    } else {
      drawGojiCanvas(ctx, x, y, stage, state, frame); // shape fallback
    }
  }

  // ================================================================
  // SHIELD BUBBLE (drawn around Goji when hasShield is true)
  // ================================================================
  function drawShieldBubble(ctx, p, frame) {
    const cx = p.x + p.width  / 2;
    const cy = p.y + p.height / 2;
    const r  = Math.max(p.width, p.height) / 2 + 13;
    const pulse = 0.5 + 0.22 * Math.sin(frame * 0.11);

    const grd = ctx.createRadialGradient(cx, cy, r * 0.3, cx, cy, r * 1.6);
    grd.addColorStop(0, `rgba(160,232,255,${pulse * 0.28})`);
    grd.addColorStop(1, 'rgba(160,232,255,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(cx, cy, r * 1.6, 0, Math.PI * 2);
    ctx.fill();

    ctx.save();
    ctx.globalAlpha = pulse + 0.15;
    ctx.strokeStyle = '#A0E8FF';
    ctx.lineWidth   = 2.5;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = pulse * 0.18;
    ctx.fillStyle   = '#A0E8FF';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ================================================================
  // OBSTACLE SPRITES
  // ================================================================

  function drawBush(ctx, x, y, w, h) {
    const base = y + h;

    // Trunk stub
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(x + w * 0.4, base - 8, w * 0.2, 8);

    // Three overlapping circles
    const circles = [
      { cx: x + w * 0.22, cy: base - h * 0.38, r: h * 0.37, s:  0  },
      { cx: x + w * 0.50, cy: base - h * 0.60, r: h * 0.48, s:  18 },
      { cx: x + w * 0.78, cy: base - h * 0.38, r: h * 0.36, s: -12 },
    ];
    for (const c of circles) {
      ctx.fillStyle = shade('#4A7C3F', c.s);
      ctx.beginPath();
      ctx.arc(c.cx, c.cy, c.r, 0, Math.PI * 2);
      ctx.fill();
    }

    // Highlight on tallest circle
    ctx.fillStyle = 'rgba(255,255,255,0.13)';
    ctx.beginPath();
    ctx.arc(circles[1].cx - 4, circles[1].cy - 4, circles[1].r * 0.38, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawFlower(ctx, x, y, w, h, petalColor) {
    const sx   = x + w / 2;                 // stem/head center x
    const hdy  = y + h * 0.30;              // head y
    const pr   = w * 0.55;                  // petal reach
    const cr   = w * 0.30;                  // center radius
    const pCol = petalColor || '#FFD700';

    // Stem
    ctx.strokeStyle = '#5A9E4A';
    ctx.lineWidth   = Math.max(2, Math.round(w * 0.18));
    ctx.lineCap     = 'round';
    ctx.beginPath();
    ctx.moveTo(sx, y + h);
    ctx.lineTo(sx, hdy);
    ctx.stroke();

    // Small leaf
    ctx.fillStyle = '#5A9E4A';
    ctx.beginPath();
    ctx.ellipse(sx + w * 0.65, y + h * 0.62, w * 0.42, w * 0.17, 0.5, 0, Math.PI * 2);
    ctx.fill();

    // 5 Petals
    ctx.fillStyle = pCol;
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
      ctx.beginPath();
      ctx.ellipse(
        sx + Math.cos(a) * pr * 0.88,
        hdy + Math.sin(a) * pr * 0.88,
        pr * 0.65, pr * 0.44,
        a, 0, Math.PI * 2
      );
      ctx.fill();
    }

    // Center
    ctx.fillStyle = '#FF8C00';
    ctx.beginPath();
    ctx.arc(sx, hdy, cr, 0, Math.PI * 2);
    ctx.fill();

    // Center highlight
    ctx.fillStyle = 'rgba(255,255,200,0.52)';
    ctx.beginPath();
    ctx.arc(sx - cr * 0.28, hdy - cr * 0.28, cr * 0.38, 0, Math.PI * 2);
    ctx.fill();
  }

  // ================================================================
  // SHIELD PICKUP SPRITE
  // ================================================================
  function drawShieldPickup(ctx, x, y, w, h, frame) {
    const cx    = x + w / 2;
    const cy    = y + h / 2;
    const r     = w / 2;
    const pulse = 0.65 + 0.28 * Math.sin(frame * 0.13);

    // Outer glow
    const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 2.2);
    grd.addColorStop(0, `rgba(160,232,255,${pulse * 0.55})`);
    grd.addColorStop(1, 'rgba(160,232,255,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(cx, cy, r * 2.2, 0, Math.PI * 2);
    ctx.fill();

    // Bubble ring
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.strokeStyle = '#A0E8FF';
    ctx.lineWidth   = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();

    // Shield icon
    ctx.fillStyle = 'rgba(160,232,255,0.75)';
    ctx.beginPath();
    ctx.moveTo(cx,            cy - r * 0.56);
    ctx.lineTo(cx - r * 0.54, cy - r * 0.18);
    ctx.lineTo(cx - r * 0.54, cy + r * 0.18);
    ctx.quadraticCurveTo(cx - r * 0.54, cy + r * 0.66, cx, cy + r * 0.72);
    ctx.quadraticCurveTo(cx + r * 0.54, cy + r * 0.66, cx + r * 0.54, cy + r * 0.18);
    ctx.lineTo(cx + r * 0.54, cy - r * 0.18);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function spawnLandingFX(cx, groundY, stage) {
    if (stage === 1) {
      // Dust puff � small tan particles
      for (let i = 0; i < 7; i++) {
        const a = Math.PI + (Math.random() - 0.5) * Math.PI * 0.9;
        const s = 1.2 + Math.random() * 2.2;
        particles.push({ x: cx, y: groundY, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 0.6,
          life: 18, maxLife: 18, size: 2.5 + Math.random()*2.5, color: '#C4A882', type: 'circle' });
      }
    } else if (stage === 2) {
      // Cloud puff � larger white particles
      for (let i = 0; i < 9; i++) {
        const a = Math.PI + (Math.random() - 0.5) * Math.PI;
        const s = 2 + Math.random() * 3;
        particles.push({ x: cx, y: groundY, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 1.8,
          life: 26, maxLife: 26, size: 5 + Math.random()*6, color: '#FFFFFF', type: 'circle' });
      }
    } else {
      // Stage 3 � stomp ring + heavy dust + screen shake
      GS.shakeFrames = 14;
      particles.push({ x: cx, y: groundY, vx: 0, vy: 0,
        life: 22, maxLife: 22, size: 10, color: shade(STAGE_DATA[3].color, 25), type: 'ring' });
      for (let i = 0; i < 14; i++) {
        const a = Math.random() * Math.PI * 2;
        particles.push({ x: cx + (Math.random()-0.5)*26, y: groundY,
          vx: Math.cos(a)*(2+Math.random()*3.5), vy: Math.sin(a)*2 - 3.2,
          life: 26, maxLife: 26, size: 4+Math.random()*5, color: '#5D8A3C', type: 'circle' });
      }
    }
  }

  function spawnGrowthFX(cx, cy) {
    for (let i = 0; i < 18; i++) {
      const a = (i / 18) * Math.PI * 2;
      particles.push({ x: cx, y: cy, vx: Math.cos(a)*(3+Math.random()*2.5), vy: Math.sin(a)*(3+Math.random()*2.5),
        life: 32, maxLife: 32, size: 4+Math.random()*3, color: '#A0E8FF', type: 'circle' });
    }
  }

  function spawnShieldBreakFX(cx, cy) {
    for (let i = 0; i < 12; i++) {
      const a = Math.random() * Math.PI * 2;
      particles.push({ x: cx, y: cy, vx: Math.cos(a)*(2+Math.random()*4.5), vy: Math.sin(a)*(2+Math.random()*4.5),
        life: 24, maxLife: 24, size: 3+Math.random()*4, color: '#A0E8FF', type: 'circle' });
    }
  }

  function updateParticles() {
    for (const p of particles) {
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += 0.13;
      p.life--;
    }
    particles = particles.filter(p => p.life > 0);
  }

  function renderParticles(ctx) {
    for (const p of particles) {
      const a = p.life / p.maxLife;
      ctx.save();
      ctx.globalAlpha = a;
      if (p.type === 'circle') {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (0.35 + a * 0.65), 0, Math.PI * 2);
        ctx.fill();
      } else if (p.type === 'ring') {
        const rad = p.size + (1 - a) * 58;
        ctx.strokeStyle = p.color;
        ctx.lineWidth   = 3.5 * a;
        ctx.beginPath();
        ctx.arc(p.x, p.y, rad, 0, Math.PI * 2);
        ctx.stroke();
      } else if (p.type === 'text') {
        ctx.globalAlpha = 1; // alpha baked into colors below instead
        ctx.font        = `bold ${p.size}px "Courier New", monospace`;
        ctx.textAlign   = 'center';
        ctx.lineJoin    = 'round';
        ctx.lineWidth   = 2;
        ctx.strokeStyle = `rgba(204,85,0,${a.toFixed(2)})`;
        ctx.strokeText(p.text, Math.round(p.x), Math.round(p.y));
        ctx.fillStyle   = `rgba(255,228,78,${a.toFixed(2)})`;
        ctx.fillText(p.text, Math.round(p.x), Math.round(p.y));
      }
      ctx.restore();
    }
  }

  // ================================================================
  // SECTION 5: PLAYER (GOJI)
  // ================================================================

  const player = {
    x:            80,
    y:            GROUND_Y - STAGE_DATA[1].h,
    vy:           0,
    width:        STAGE_DATA[1].w,
    height:       STAGE_DATA[1].h,
    isGrounded:   true,
    stage:        1,
    animState:    'idle',
    animFrame:    0,
    hasShield:    false,
    shieldFlash:  0,
  };

  function resetPlayer() {
    player.stage       = 1;
    player.width       = STAGE_DATA[1].w;
    player.height      = STAGE_DATA[1].h;
    player.x           = 80;
    player.y           = GROUND_Y - player.height + 4;
    player.vy          = 0;
    player.isGrounded  = true;
    player.animState   = 'idle';
    player.animFrame   = 0;
    player.hasShield   = false;
    player.shieldFlash = 0;
  }

  function doJump() {
    if (player.isGrounded) {
      player.vy         = JUMP_VEL;
      player.isGrounded = false;
      playSound('jump');
    }
  }

  function updatePlayer() {
    if (!player.isGrounded) {
      const gm = player.vy > 0 ? FALL_MULT : 1.0;
      player.vy += GRAVITY * gm;
      player.y  += player.vy;

      const floor = GROUND_Y - player.height + 4;
      if (player.y >= floor) {
        player.y          = floor;
        player.vy         = 0;
        player.isGrounded = true;
        spawnLandingFX(player.x + player.width / 2, GROUND_Y, player.stage);
      }
    }

    // Animation state
    if (player.animState !== 'dead') {
      if (!player.isGrounded) {
        player.animState = 'jump';
      } else {
        player.animFrame++;
        player.animState = player.animFrame % 16 < 8 ? 'run1' : 'run2';
      }
    }

    if (player.shieldFlash > 0) player.shieldFlash--;
  }

  function checkStageGrowth() {
    // TODO: re-enable once sprites for all stages are ready
    return;
    // eslint-disable-next-line no-unreachable
    let ns = 1;
    if (GS.score >= STAGE_THRESH[3]) ns = 3;
    else if (GS.score >= STAGE_THRESH[2]) ns = 2;

    if (ns > player.stage) {
      player.stage  = ns;
      const prevBot = player.y + player.height;
      player.width  = STAGE_DATA[ns].w;
      player.height = STAGE_DATA[ns].h;
      player.y      = player.isGrounded
        ? GROUND_Y - player.height + 4
        : prevBot - player.height;
      spawnGrowthFX(player.x + player.width / 2, player.y + player.height / 2);
      playSound('grow');
    }
  }

  function playerHitbox() {
    const i = 5;
    return { x: player.x + i, y: player.y + i, w: player.width - i*2, h: player.height - i*2 };
  }

  // ================================================================
  // SECTION 6: OBSTACLES
  // ================================================================

  function weightedPick(types) {
    const total = types.reduce((s, t) => s + OBSTACLE_TYPES[t].spawnWeight, 0);
    let r = Math.random() * total;
    for (const t of types) {
      r -= OBSTACLE_TYPES[t].spawnWeight;
      if (r <= 0) return t;
    }
    return types[types.length - 1];
  }

  function spawnObstacle() {
    const lvl      = LEVELS[GS.currentLevel];
    const type     = weightedPick(lvl.obstacleTypes);
    const def      = OBSTACLE_TYPES[type];
    const isDouble = type === 'FLOWER' && Math.random() < 0.20;
    const DBL_GAP  = 4;
    obstacles.push({
      type,
      x:          CANVAS_W + 12,
      y:          GROUND_Y - def.height + 4 + (def.yOffset || 0),
      width:      isDouble ? def.width * 2 + DBL_GAP : def.width,
      height:     def.height,
      hitbox:     isDouble
                    ? { ox: 4, oy: 2, ow: def.width * 2 + DBL_GAP - 8, oh: 42 }
                    : { ...def.hitbox },
      petalColor:  type === 'FLOWER' ? (Math.random() < 0.5 ? '#FFD700' : '#FF6B9D') : null,
      petalColor2: isDouble          ? (Math.random() < 0.5 ? '#FFD700' : '#FF6B9D') : null,
      double:      isDouble,
    });
  }

  function updateObstacles() {
    for (const o of obstacles) o.x -= GS.speed;

    spawnTimer--;
    if (spawnTimer <= 0) {
      spawnObstacle();
      const sf = Math.max(0.55, INIT_SPEED / GS.speed);
      spawnTimer = Math.round((58 + Math.random() * 90) * sf);
    }

    obstacles = obstacles.filter(o => o.x + o.width > -24);
  }

  function renderObstacles(ctx) {
    for (const o of obstacles) {
      const fn = DRAW[OBSTACLE_TYPES[o.type].drawFn];
      if (!fn) continue;
      if (o.double) {
        const sw = OBSTACLE_TYPES[o.type].width;
        fn(ctx, o.x,          o.y, sw, o.height, o.petalColor);
        fn(ctx, o.x + sw + 4, o.y, sw, o.height, o.petalColor2);
      } else {
        fn(ctx, o.x, o.y, o.width, o.height, o.petalColor);
      }
    }
  }

  const COLLECT_FNS = { applyShield };

  function updatePowerUps() {
    const lvl = LEVELS[GS.currentLevel];

    for (const typeName of lvl.powerUpTypes) {
      const def = POWERUP_TYPES[typeName];
      if (!def) continue;
      if (typeName === 'SHIELD' && player.hasShield) continue;
      if (powerUps.some(p => p.type === typeName)) continue;
      if (Math.random() < def.spawnChance) {
        const baseY = GROUND_Y - def.floatAbove;
        powerUps.push({
          type:      typeName,
          x:         CANVAS_W + 12,
          y:         baseY,
          baseY,
          width:     def.width,
          height:    def.height,
          bobOff:    Math.random() * Math.PI * 2,
          hitbox:    { ...def.hitbox },
        });
      }
    }

    for (const p of powerUps) {
      p.x -= GS.speed;
      const def = POWERUP_TYPES[p.type];
      p.y = p.baseY + Math.sin(GS.frame * def.bobSpeed + p.bobOff) * def.bobAmplitude;
    }

    powerUps = powerUps.filter(p => p.x + p.width > -24);
  }

  function renderPowerUps(ctx) {
    for (const p of powerUps) {
      const fn = DRAW[POWERUP_TYPES[p.type].drawFn];
      if (fn) fn(ctx, p.x, p.y, p.width, p.height, GS.frame);
    }
  }

  // ================================================================
  // SECTION 8: LEVEL / BACKGROUND
  // ================================================================

  function initBackground() {
    const lvl = LEVELS[GS.currentLevel];
    groundOff = 0;

    clouds = [];
    for (let i = 0; i < lvl.cloudCount; i++) {
      clouds.push({
        x:     Math.random() * CANVAS_W,
        y:     16 + Math.random() * 65,
        w:     58 + Math.random() * 70,
        h:     20 + Math.random() * 20,
        layer: i % 2 === 0 ? 1 : 2,
      });
    }

    bugs = [];
    for (let i = 0; i < lvl.bugCount; i++) {
      const isButterfly = Math.random() < 0.5;
    const bugBaseY = GROUND_Y - 28 - Math.random() * 72;
    bugs.push({
        x:           Math.random() * CANVAS_W,
        y:           bugBaseY,
        baseY:       bugBaseY,
        size:        isButterfly ? 2 + Math.random() * 1.5 : 3.5 + Math.random() * 1.5,
        speedMul:    0.55 + Math.random() * 0.35,
        phase:       Math.random() * Math.PI * 2,
        wobblePhase: Math.random() * Math.PI * 2,
        tilt:        isButterfly
                       ? (Math.random() - 0.5) * 0.28
                       : (Math.random() < 0.5 ? 1 : -1) * (Math.PI / 2 + 0.06 + Math.random() * 0.12),
        type:        isButterfly ? 'butterfly' : 'bee',
      });
    }

    trees = [];
    for (let i = 0; i < 8; i++) {
      trees.push({
        x:        i * (CANVAS_W / 8) + Math.random() * 40,
        imgIdx:   Math.floor(Math.random() * 3),
        imgIdx2:  Math.floor(Math.random() * 3),
        double:   Math.random() < 0.40,
        speedMul: 0.60 + Math.random() * 0.10,
      });
    }

  }

  function updateBackground() {
    groundOff = (groundOff + GS.speed) % 80;

    for (const c of clouds) {
      c.x -= GS.speed * (c.layer === 1 ? 0.17 : 0.35);
      if (c.x + c.w < -10) {
        c.x = CANVAS_W + Math.random() * 100;
        c.y = 14 + Math.random() * 68;
        c.w = 55 + Math.random() * 68;
        c.h = 18 + Math.random() * 22;
      }
    }

    for (const b of bugs) {
      b.x -= GS.speed * b.speedMul;
      if (b.x < -12) {
        b.baseY = GROUND_Y - 24 - Math.random() * 78;
        b.x = CANVAS_W + Math.random() * 120;
      }
      b.y = b.baseY + Math.sin(GS.frame * 0.022 + b.phase) * 5;
    }

    for (const t of trees) {
      t.x -= GS.speed * t.speedMul;
      if (t.x < -300) {
        t.x     = CANVAS_W + 10 + Math.random() * 80;
        t.imgIdx  = Math.floor(Math.random() * 3);
        t.imgIdx2 = Math.floor(Math.random() * 3);
        t.double  = Math.random() < 0.40;
      }
    }

  }

  function renderBackground(ctx) {
    const lvl = LEVELS[GS.currentLevel];

    // Sky � subtle gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    skyGrad.addColorStop(0,   lvl.bgColor);
    skyGrad.addColorStop(1,   lvl.bgGradBottom || lvl.bgColor);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    // Far clouds (layer 1)
    for (const c of clouds) {
      if (c.layer === 1) drawCloud(ctx, c.x, c.y, c.w, c.h, 0.72);
    }

    // Near clouds (layer 2)
    for (const c of clouds) {
      if (c.layer === 2) drawCloud(ctx, c.x, c.y, c.w, c.h, 0.95);
    }

    // Ground
    ctx.fillStyle = lvl.groundColor;
    ctx.fillRect(0, GROUND_Y, CANVAS_W, CANVAS_H - GROUND_Y);

    // Ground top edge line
    ctx.fillStyle = lvl.dirtColor;
    ctx.fillRect(0, GROUND_Y, CANVAS_W, 5);

    // Scrolling grass tufts
    ctx.strokeStyle = shade(lvl.groundColor, 22);
    ctx.lineWidth   = 2;
    ctx.lineCap     = 'round';
    const spacing   = 80;
    for (let tx = -((groundOff | 0) % spacing); tx < CANVAS_W + spacing; tx += spacing) {
      // Tuft A
      ctx.beginPath();
      ctx.moveTo(tx - 5, GROUND_Y); ctx.lineTo(tx, GROUND_Y - 8); ctx.lineTo(tx + 5, GROUND_Y);
      ctx.stroke();
      // Tuft B
      ctx.beginPath();
      ctx.moveTo(tx + 20, GROUND_Y); ctx.lineTo(tx + 24, GROUND_Y - 6); ctx.lineTo(tx + 28, GROUND_Y);
      ctx.stroke();
    }

    // Trees
    ctx.save();
    ctx.globalAlpha = 0.92;
    ctx.imageSmoothingEnabled = false;
    for (const t of trees) drawTreeEntry(ctx, t, 190, GROUND_Y - 190 + 3);
    ctx.restore();

    // Butterflies and Bees
    ctx.save();
    ctx.globalAlpha = 0.85;
    for (const b of bugs) {
      const wobble = Math.sin(GS.frame * 0.015 + b.wobblePhase) * (b.type === 'bee' ? 0.06 : 0.10);
      const totalTilt = b.tilt + wobble;
      if (b.type === 'butterfly') drawButterfly(ctx, b.x, b.y, b.size, b.phase, GS.frame, totalTilt);
      else                         drawBee(ctx, b.x, b.y, b.size, b.phase, GS.frame, totalTilt);
    }
    ctx.restore();
  }

  function drawTreeEntry(ctx, t, h, yPos) {
    const img = TREE_IMGS[t.imgIdx];
    if (!img || !img.complete) return;
    const w = Math.round(img.naturalWidth * (h / img.naturalHeight));
    ctx.drawImage(img, Math.round(t.x), yPos, w, h);
    if (t.double) {
      const img2 = TREE_IMGS[t.imgIdx2];
      if (!img2 || !img2.complete) return;
      const w2 = Math.round(img2.naturalWidth * (h / img2.naturalHeight));
      ctx.drawImage(img2, Math.round(t.x + w + 2), yPos, w2, h);
    }
  }

  function drawCloud(ctx, x, y, w, h, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha * 0.86;
    ctx.fillStyle   = '#FFFFFF';
    ctx.beginPath();
    ctx.ellipse(x + w * 0.24, y + h * 0.62, w * 0.27, h * 0.44, 0, 0, Math.PI * 2);
    ctx.ellipse(x + w * 0.52, y + h * 0.40, w * 0.36, h * 0.58, 0, 0, Math.PI * 2);
    ctx.ellipse(x + w * 0.78, y + h * 0.62, w * 0.25, h * 0.44, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawButterfly(ctx, x, y, size, phase, frame, tilt) {
    const s    = Math.max(1, Math.round(size * 0.55));
    const lift = Math.round(Math.sin(frame * 0.042 + phase) * s * 0.9);

    ctx.save();
    ctx.translate(Math.round(x), Math.round(y));
    ctx.rotate(tilt);

    // Upper wings (orange) � rise with flap
    ctx.fillStyle = '#D97018';
    ctx.fillRect(-s * 3, -s - lift, s * 2, s * 2);
    ctx.fillRect( s + 1, -s - lift, s * 2, s * 2);

    // Lower wings (dark amber) � sink slightly with flap
    ctx.fillStyle = '#8B4510';
    ctx.fillRect(-s * 2, lift, s * 2, s);
    ctx.fillRect( s + 1,  lift, s * 2, s);

    // Body
    ctx.fillStyle = '#1a0800';
    ctx.fillRect(-1, -s * 2, 2, s * 4);

    // Antennae tips (1 px dots)
    ctx.fillRect(-s * 2, -s * 3, 1, 1);
    ctx.fillRect( s * 2, -s * 3, 1, 1);

    ctx.restore();
  }

  function drawBee(ctx, x, y, size, phase, frame, tilt) {
    // tilt already encodes �p/2 facing direction
    const s    = Math.max(1, Math.round(size * 0.5));
    const flap = Math.round(Math.abs(Math.sin(frame * 0.042 + phase)) * s);

    ctx.save();
    ctx.translate(Math.round(x), Math.round(y));
    ctx.rotate(tilt);

    // Wings (perpendicular to body axis)
    ctx.fillStyle = 'rgba(200,230,255,0.6)';
    ctx.fillRect(-s, -s * 3 - flap, s * 2, s * 2);
    ctx.fillRect(-s,  s * 1 + flap, s * 2, s * 2);

    // Body � yellow base
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(-s, -s * 2, s * 2, s * 4);

    // Black stripes
    ctx.fillStyle = '#111';
    ctx.fillRect(-s, -s,     s * 2, s);
    ctx.fillRect(-s,  s,     s * 2, s);

    // Stinger
    ctx.fillStyle = '#666';
    ctx.fillRect(-1, s * 2, 2, s);

    // Head (dark square at top of body)
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-s, -s * 3, s * 2, s);

    // Antennae tips
    ctx.fillRect(-s,     -s * 4, 1, 1);
    ctx.fillRect( s - 1, -s * 4, 1, 1);

    ctx.restore();
  }

  // ================================================================
  // SECTION 9: COLLISION DETECTION
  // ================================================================

  function hb(entity, hbDef) {
    return { x: entity.x + hbDef.ox, y: entity.y + hbDef.oy, w: hbDef.ow, h: hbDef.oh };
  }

  function overlaps(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function checkAllCollisions() {
    const ph = playerHitbox();

    // Obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o  = obstacles[i];
      const oh = hb(o, o.hitbox);
      if (!overlaps(ph, oh)) continue;

      // Stomp: player must be falling AND bottom within threshold of obstacle top
      if (player.vy > 0 && (ph.y + ph.h) <= oh.y + STOMP_THRESH) {
        handleStomp(o, i);
      } else {
        handleHit(i);
        return;
      }
    }

    // Power-ups
    for (let i = powerUps.length - 1; i >= 0; i--) {
      const pu = powerUps[i];
      if (overlaps(ph, hb(pu, pu.hitbox))) {
        const fn = COLLECT_FNS[POWERUP_TYPES[pu.type].onCollect];
        if (fn) fn();
        powerUps.splice(i, 1);
      }
    }
  }

  function handleStomp(obstacle, idx) {
    const pts = OBSTACLE_TYPES[obstacle.type].stompPoints;
    GS.score  += pts;
    player.vy  = -6;
    player.isGrounded = false;
    const cx = obstacle.x + obstacle.width / 2;
    spawnLandingFX(cx, obstacle.y, player.stage);
    obstacles.splice(idx, 1);
    playSound('stomp');
    const label = { 10: 'CRUNCH!', 20: 'SMASH!', 30: 'CRASH!', 40: 'WRECK!', 50: 'OBLITERATE!' };
    particles.push({
      type: 'text', text: `+${pts} ${label[pts] || 'STOMP!'}`,
      x: player.x + player.width * 0.75, y: player.y - 4,
      vx: 0, vy: -1.1,
      life: 42, maxLife: 42,
      color: '#FFE44E', size: 11,
    });
  }

  function handleHit(obstacleIdx) {
    if (player.hasShield) {
      player.hasShield   = false;
      player.shieldFlash = 28;
      if (obstacleIdx !== undefined) obstacles.splice(obstacleIdx, 1); // silently destroy obstacle
      spawnShieldBreakFX(player.x + player.width / 2, player.y + player.height / 2);
      playSound('shieldBreak');
      return;
    }
    player.animState = 'dead';
    if (GS.score > GS.highScore) GS.highScore = GS.score;
    GS.screen = 'DEAD';
    playSound('death');
  }

  // ================================================================
  // SECTION 10: INPUT
  // ================================================================

  let spaceDown = false;

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.key === ' ') {
      e.preventDefault();
      if (!spaceDown) { spaceDown = true; onAction(); }
    }
  });
  document.addEventListener('keyup', e => {
    if (e.code === 'Space' || e.key === ' ') spaceDown = false;
  });
  document.addEventListener('touchstart', e => {
    e.preventDefault();
    onAction();
  }, { passive: false });
  canvas.addEventListener('click', () => onAction());

  function onAction() {
    if      (GS.screen === 'START')   startGame();
    else if (GS.screen === 'PLAYING') doJump();
    else if (GS.screen === 'DEAD')    resetGame();
  }

  // ================================================================
  // SECTION 11: AUDIO � TODO
  // ================================================================
  //
  // To implement: use the Web Audio API.
  //
  //   const AC = new (window.AudioContext || window.webkitAudioContext)();
  //
  // Then synthesize each sound with OscillatorNode / BiquadFilterNode:
  //   'jump'          � rising chirp  200?400 Hz, 80ms
  //   'stomp'         � punchy thud   150 Hz burst, 60ms
  //   'shieldBreak'   � glass shatter white noise, 120ms decay
  //   'shieldCollect' � chime ping    800 Hz, 200ms
  //   'death'         � falling slide 400?80 Hz, 300ms
  //   'grow'          � 3-note ascending arpeggio
  //   'land'          � soft thud     120 Hz, 40ms

  function playSound(/* name */) {
    // TODO: implement Web Audio API sounds
  }

  // ================================================================
  // SECTION 12: GAME LOOP
  // ================================================================

  function updateSpeed() {
    const m = Math.floor(GS.score / 100);
    if (m > GS.lastSpeedMile) {
      GS.speed         = INIT_SPEED + m * SPEED_INC;
      GS.lastSpeedMile = m;
    }
  }

  function updateGame() {
    GS.frame++;
    updateSpeed();
    updateBackground();
    updatePlayer();
    updateObstacles();
    updatePowerUps();
    updateParticles();
    checkAllCollisions();
    checkStageGrowth();
  }

  function renderGame() {
    ctx.save();

    // Screen shake
    if (GS.shakeFrames > 0) {
      ctx.translate(
        (Math.random() - 0.5) * GS.shakeMag,
        (Math.random() - 0.5) * GS.shakeMag
      );
      GS.shakeFrames--;
    }

    renderBackground(ctx);
    renderParticles(ctx);
    renderObstacles(ctx);
    renderPowerUps(ctx);

    // Shield break flash ring
    if (player.shieldFlash > 0 && Math.floor(player.shieldFlash / 3) % 2 === 0) {
      const cx = player.x + player.width  / 2;
      const cy = player.y + player.height / 2;
      const r  = Math.max(player.width, player.height) / 2 + 16;
      ctx.save();
      ctx.globalAlpha = player.shieldFlash / 28 * 0.6;
      ctx.strokeStyle = '#A0E8FF';
      ctx.lineWidth   = 4;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // Shield bubble
    if (player.hasShield) drawShieldBubble(ctx, player, GS.frame);

    // Goji
    drawGoji(ctx, player.x, player.y, player.stage, player.animState, GS.frame);

    ctx.restore(); // end shake

    renderHUD(ctx); // always stable � outside shake transform
  }

  function renderHUD(ctx) {
    ctx.save();

    // Translucent header bar
    ctx.fillStyle = 'rgba(0,0,0,0.24)';
    ctx.fillRect(0, 0, CANVAS_W, 48);

    ctx.font = 'bold 13px "Courier New", monospace';

    // Left: score
    ctx.textAlign = 'left';
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText(`DAMAGE: ${GS.score}`, 12, 18);
    ctx.fillStyle = 'rgba(255,255,255,0.52)';
    ctx.font      = '12px "Courier New", monospace';
    ctx.fillText(`BEST:   ${GS.highScore}`, 12, 34);

    // Center: stage name + speed
    ctx.textAlign = 'center';
    ctx.fillStyle = STAGE_DATA[player.stage].color;
    ctx.font      = 'bold 11px "Courier New", monospace';
    ctx.fillText(`STAGE: ${STAGE_DATA[player.stage].name}`, CANVAS_W / 2, 17);
    ctx.fillStyle = 'rgba(255,255,255,0.38)';
    ctx.font      = '10px "Courier New", monospace';
    ctx.fillText(`SPD ${GS.speed.toFixed(1)}`, CANVAS_W / 2, 32);

    // Right: shield status
    ctx.textAlign = 'right';
    if (player.hasShield) {
      ctx.fillStyle = Math.sin(GS.frame * 0.18) > 0 ? '#A0E8FF' : '#FFFFFF';
      ctx.font      = 'bold 13px "Courier New", monospace';
      ctx.fillText('SHIELD: ACTIVE', CANVAS_W - 12, 18);
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.32)';
      ctx.font      = '13px "Courier New", monospace';
      ctx.fillText('SHIELD: NONE', CANVAS_W - 12, 18);
    }

    ctx.restore();
  }

  // ================================================================
  // SECTION 13: SCREEN STATE MACHINE
  // ================================================================

  // ---- START ----
  function updateStart() {
    GS.frame++;
    // Background stays frozen until SPACE is pressed
  }

  function renderStart() {
    renderBackground(ctx);

    // Goji idle animation on start screen
    drawGoji(ctx, CANVAS_W / 2 - STAGE_DATA[1].w / 2, GROUND_Y - STAGE_DATA[1].h, 1, 'idle', GS.frame);

    // Title panel
    ctx.fillStyle = 'rgba(0,0,0,0.38)';
    rrect(ctx, CANVAS_W / 2 - 178, 42, 356, 140, 16);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth   = 1.5;
    rrect(ctx, CANVAS_W / 2 - 178, 42, 356, 140, 16);
    ctx.stroke();

    // Title
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFFFFF';
    ctx.font      = 'bold 38px "Courier New", monospace';
    ctx.fillText('GOJI STOMP', CANVAS_W / 2, 96);

    // Subtitle
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font      = '12px "Courier New", monospace';
    ctx.fillText('Jump ON enemies to STOMP � avoid sides', CANVAS_W / 2, 120);

    // Start prompt � large, always visible, slow blink
    ctx.fillStyle = Math.floor(GS.frame / 35) % 2 === 0 ? '#FFD700' : 'rgba(255,215,0,0.6)';
    ctx.font      = 'bold 20px "Courier New", monospace';
    ctx.fillText('PRESS SPACE / TAP TO START', CANVAS_W / 2, 152);

    // High score
    if (GS.highScore > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.font      = '11px "Courier New", monospace';
      ctx.fillText(`BEST: ${GS.highScore}`, CANVAS_W / 2, 170);
    }
  }

  // ---- DEAD ----
  function updateDead() {
    GS.frame++;
    updateParticles();
  }

  function renderDead() {
    renderBackground(ctx);
    renderParticles(ctx);
    renderObstacles(ctx);
    renderPowerUps(ctx);
    drawGoji(ctx, player.x, player.y, player.stage, 'dead', GS.frame);

    // Dim overlay
    ctx.fillStyle = 'rgba(0,0,0,0.48)';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    // Death panel
    ctx.fillStyle = 'rgba(28, 4, 4, 0.82)';
    rrect(ctx, CANVAS_W / 2 - 148, 46, 296, 178, 16);
    ctx.fill();
    ctx.strokeStyle = '#FF6B6B';
    ctx.lineWidth   = 2;
    rrect(ctx, CANVAS_W / 2 - 148, 46, 296, 178, 16);
    ctx.stroke();

    ctx.textAlign = 'center';

    ctx.fillStyle = '#FF6B6B';
    ctx.font      = 'bold 30px "Courier New", monospace';
    ctx.fillText('GAME OVER', CANVAS_W / 2, 92);

    ctx.fillStyle = '#FFFFFF';
    ctx.font      = '14px "Courier New", monospace';
    ctx.fillText(`Damage: ${GS.score}`, CANVAS_W / 2, 120);

    ctx.fillStyle = '#FFD700';
    ctx.fillText(`Best:   ${GS.highScore}`, CANVAS_W / 2, 140);

    if (Math.floor(GS.frame / 26) % 2 === 0) {
      ctx.fillStyle = '#FFFFFF';
      ctx.font      = 'bold 13px "Courier New", monospace';
      ctx.fillText('PRESS SPACE / TAP TO RETRY', CANVAS_W / 2, 170);
    }

    const quips = ['ouch!  (???)', 'oh no!  (-_-)', 'you can do it!  (? �_�)?', 'try again!  (�?�)'];
    ctx.fillStyle = 'rgba(255,255,255,0.38)';
    ctx.font      = '11px "Courier New", monospace';
    ctx.fillText(quips[GS.highScore % quips.length], CANVAS_W / 2, 206);
  }

  // ================================================================
  // SECTION 14: INIT
  // ================================================================

  function startGame() {
    resetGame();
  }

  function resetGame() {
    GS.score         = 0;
    GS.speed         = INIT_SPEED;
    GS.frame         = 0;
    GS.lastSpeedMile = 0;
    GS.shakeFrames   = 0;
    GS.currentLevel  = 1;
    obstacles        = [];
    powerUps         = [];
    particles        = [];
    spawnTimer       = 90;
    resetPlayer();
    initBackground();
    GS.screen = 'PLAYING';
  }

  function gameLoop() {
    switch (GS.screen) {
      case 'START':   updateStart(); renderStart(); break;
      case 'PLAYING': updateGame();  renderGame();  break;
      case 'DEAD':    updateDead();  renderDead();  break;
    }
    requestAnimationFrame(gameLoop);
  }

  // ---- Boot ----
  loadSprites();
  loadTrees();
  initBackground();
  requestAnimationFrame(gameLoop);

  if ('ontouchstart' in window) {
    document.getElementById('instructions').textContent = 'TAP TO JUMP';
  }

  </script>
